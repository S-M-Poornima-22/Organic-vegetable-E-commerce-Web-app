<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>organic shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="top-bar">
        <h2>Free shipping in Chennai. Order above RS.500</h2>
    </div>
    <div class="top-header">
        <div class="left-icons">
            <i class="fas fa-bars"></i>
            <i class="fas fa-users"></i>
        </div>
        <div class="logo">
            <img src="images/rice.png">
        </div>
        <div class="right-icons">
        <div class="cart-icon" onclick="toggleCart()">
        🛒
        <span id="cartCount">0</span>
        </div>
        <i class="fas fa-search"></i>
        </div>
        <div id="cartPanel" class="cart-panel">
        <div id="cartItems"></div>
        <h3 id="totalPrice">Total: ₹0</h3>
        </div>
    </div>
    <div class="banner">
        <div class="overlay"></div>
        <div class="banner-text">
            <h1>Organic Vegetable Shop</h1>
            <p>Fresh | Healthy | Natural</p>
        </div>
    </div>
    <div class="shop">
    <h1>SHOP  BY  CATEGORIES</h1>
    </div>
<section class="icon-category">
    <div  class="icon">
        <img src="images/vegetable.png.png" width="120" onclick="showVeg()">
        <p>Vegetables</p>
    </div>
    <div class="icon">
        <img src="images/fruits.png" width="120" onclick="showFruits()">
        <p>Fruits</p>
    </div>
    <div class="icon">
        <img src="images/greens.png" width="120" onclick="showGreens()">
        <p>Greens</p>
    </div>
    <div class="icon">
        <img src="images/egg.png" width="120" onclick="showProteins()">
        <p>Proteins</p>
    </div>
    <div class="icon">
        <img src="images/rice.png" width="120" onclick="showRice()">
        <p>Rice & Millets</p>
    </div>
    <div class="icon">
        <img src="images/ghee.png" width="120" onclick="showGhee()">
        <p>Ghee</p>
    </div>
</section>
<div id="products"></div>
<section class="health-section">

<h2>Get Healthy Food Recommendation</h2>

<form id="healthForm">

<input type="number" id="age" placeholder="Enter Age" required>

<input type="number" id="height" placeholder="Enter Height (cm)" required>

<input type="number" id="weight" placeholder="Enter Weight (kg)" required>

<select id="condition">
<option value="">Select Health Condition</option>
<option value="Diabetes">Diabetes</option>
<option value="BP">Blood Pressure</option>
<option value="WeightLoss">Weight Loss</option>
</select>

<button type="submit">Get Recommendation</button>

</form>

</section>

<div id="recommendations"></div>
 <script src="script.js"></script> 
</body>
